services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-litellm}
      POSTGRES_USER: ${POSTGRES_USER:-litellm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-litellm-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  litellm:
    image: docker.litellm.ai/berriai/litellm:main-latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./env/litellm.env
    command:
      - --config
      - /app/config.yaml
      - --port
      - "4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    ports:
      - "127.0.0.1:4000:4000"

  ai-gateway:
    build:
      context: ..
      dockerfile: services/ai-gateway/Dockerfile
    restart: unless-stopped
    depends_on:
      - litellm
    env_file:
      - ./env/ai-gateway.env
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  postgres_data:
